name: CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Tool versions
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Install tools
        run: brew install xcodegen swiftlint

      - name: Resolve simulator
        id: sim
        run: |
          set -euo pipefail
          NAME=$(xcrun simctl list devices available --json \
            | jq -r '[.devices[] | .[] | select(.isAvailable) | select(.name | test("^iPhone")) | .name] | (map(select(. == "iPhone 16")) + .)[0]')
          echo "Using simulator: $NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Lint
        run: make lint

      - name: Package tests
        run: make test-packages SIM_NAME="${{ steps.sim.outputs.name }}"

      - name: Coverage report and AnchorCore gate
        if: always()
        run: |
          if [ ! -d build/package-tests.xcresult ]; then
            echo "no result bundle; skipping coverage"
            exit 0
          fi
          xcrun xccov view --report --only-targets build/package-tests.xcresult > build/coverage.txt || true
          cat build/coverage.txt
          PCT=$(awk '$2=="AnchorCore"{for(i=1;i<=NF;i++) if($i ~ /%$/){gsub(/%/,"",$i); print $i; exit}}' build/coverage.txt)
          echo "AnchorCore coverage: ${PCT:-unknown}"
          # Domain logic must stay well-tested (spec gate: >= 80%).
          awk -v p="${PCT:-0}" 'BEGIN{ exit (p+0 >= 80) ? 0 : 1 }' \
            || { echo "AnchorCore coverage ${PCT}% is below the 80% gate"; exit 1; }

      - name: App build
        if: ${{ hashFiles('project.yml') != '' }}
        run: make build SIM_NAME="${{ steps.sim.outputs.name }}"

      - name: App UI tests
        if: ${{ hashFiles('project.yml') != '' }}
        run: make uitest SIM_NAME="${{ steps.sim.outputs.name }}"

      - name: Publish ci-logs
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OUTCOME: ${{ job.status }}
        run: bash scripts/ci-report.sh

      - name: Upload full logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build/*.log
          if-no-files-found: ignore
