name: Build IPA

# Produces an unsigned device .ipa for personal sideloading (AltStore /
# Sideloadly re-sign it with your free Apple ID). Run it from the Actions tab
# ("Build IPA" → Run workflow), then download the anchor-ipa artifact.
on:
  workflow_dispatch:
  # Also builds when this workflow itself changes, so it stays verified.
  push:
    paths:
      - .github/workflows/ipa.yml

permissions:
  contents: read

concurrency:
  group: ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ipa:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build unsigned device app (Release)
        run: |
          set -o pipefail
          mkdir -p build
          xcodebuild build \
            -project Anchor.xcodeproj \
            -scheme Anchor \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/dd \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            2>&1 | tee build/ipa-build.log

      - name: Package .ipa
        run: |
          set -euo pipefail
          APP="build/dd/Build/Products/Release-iphoneos/Anchor.app"
          if [ ! -d "$APP" ]; then
            echo "App not found at $APP" >&2
            find build/dd/Build/Products -maxdepth 2 -name '*.app' >&2 || true
            exit 1
          fi
          rm -rf build/Payload build/Anchor.ipa
          mkdir -p build/Payload
          cp -R "$APP" "build/Payload/Anchor.app"
          (cd build && zip -qry Anchor.ipa Payload)
          ls -la build/Anchor.ipa

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: anchor-ipa
          path: build/Anchor.ipa
          if-no-files-found: error
