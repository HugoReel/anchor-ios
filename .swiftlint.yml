included:
  - App
  - Packages/Anchor/Sources
  - Packages/Anchor/Tests

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - fatal_error_message
  - force_unwrapping

disabled_rules:
  - todo

force_unwrapping:
  severity: error

line_length:
  warning: 140
  error: 200

identifier_name:
  min_length: 2

# Dependency-injection initializers (e.g. the data exporter) legitimately
# take one parameter per collaborator. Keep the rule for genuinely excessive
# cases; default-valued params are already ignored.
function_parameter_count:
  warning: 10
  error: 14
  ignores_default_parameters: true

type_body_length:
  warning: 350
  error: 500

file_length:
  warning: 500
  error: 800

# Dynamic Type guard (Task 5.2): a height-only frame constrains a view's
# height while its text wants to grow, clipping at large accessibility sizes.
# Graphical elements use `.frame(width:height:)` and are unaffected; text rows
# must use minHeight / ViewThatFits, or add an explicit swiftlint:disable with
# a note. No current code trips this — it guards future changes.
custom_rules:
  height_only_frame:
    name: "Height-only frame"
    regex: '\.frame\(height:'
    message: "Height-only frames can clip text at large Dynamic Type sizes; use minHeight or ViewThatFits (or disable with a note)."
    severity: warning
