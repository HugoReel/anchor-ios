name: Anchor
options:
  bundleIdPrefix: com.hugoreel
  deploymentTarget:
    iOS: "17.0"
packages:
  Anchor:
    path: Packages/Anchor
targets:
  Anchor:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "Resources/**"
      - path: App/Resources
        buildPhase: resources
    dependencies:
      - package: Anchor
        products:
          - AnchorCore
          - AnchorDesign
          - AnchorPersistence
          - AnchorPlatform
          - FeatureToday
          - FeatureTimeline
          - FeatureGoals
          - FeatureReflect
          - FeatureCoping
          - FeatureSettings
          - FeatureOnboarding
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Anchor
        UILaunchScreen: {}
        UIAppFonts:
          - Lexend-Regular.ttf
          - Lexend-SemiBold.ttf
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
  AnchorUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: AnchorUITests
    dependencies:
      - target: Anchor
    settings:
      base:
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        TEST_TARGET_NAME: Anchor
schemes:
  Anchor:
    build:
      targets:
        Anchor: all
        AnchorUITests: [test]
    test:
      targets:
        - AnchorUITests
